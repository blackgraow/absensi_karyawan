{% extends "base.html" %}

{% block title %}Tambah Karyawan - Absensi Karyawan{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-lg-8">
    <div class="card shadow-sm">
      <div class="card-header bg-success text-white">
        <h5 class="mb-0">Tambah Karyawan Baru</h5>
      </div>
      <div class="card-body">
        <form method="post" enctype="multipart/form-data">
          <div class="mb-3">
            <label for="nama" class="form-label">Nama Lengkap <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="nama" name="nama" placeholder="Masukkan nama lengkap" required>
          </div>

          <div class="row">
            <div class="col-md-6">
              <div class="mb-3">
                <label for="username" class="form-label">Username <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="username" name="username" placeholder="Masukkan username" required>
              </div>
            </div>
            <div class="col-md-6">
              <div class="mb-3">
                <label for="password" class="form-label">Password <span class="text-danger">*</span></label>
                <input type="password" class="form-control" id="password" name="password" placeholder="Masukkan password" required>
              </div>
            </div>
          </div>

          <div class="row">
            <div class="col-md-6">
              <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" name="email" placeholder="Masukkan email">
              </div>
            </div>
            <div class="col-md-6">
              <div class="mb-3">
                <label for="no_telepon" class="form-label">Nomor Telepon</label>
                <input type="text" class="form-control" id="no_telepon" name="no_telepon" placeholder="Masukkan nomor telepon">
              </div>
            </div>
          </div>

          <div class="mb-3">
            <label for="jabatan" class="form-label">Jabatan</label>
            <input type="text" class="form-control" id="jabatan" name="jabatan" placeholder="Masukkan jabatan">
          </div>

          <div class="mb-3">
            <label for="foto" class="form-label">Foto Wajah (PNG, JPG, JPEG, GIF)</label>
            <input type="file" class="form-control" id="foto" name="foto" accept="image/*">
            <small class="text-muted">Ukuran maksimal: 5MB</small>
          </div>

          <div class="d-grid gap-2 d-sm-flex justify-content-sm-end">
            <a href="{{ url_for('daftar_karyawan') }}" class="btn btn-secondary">Batal</a>
            <button type="submit" class="btn btn-success">Simpan Karyawan</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
